<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enroll | Learning Beyond Barriers</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fcebeb; font-family: 'Poppins', sans-serif; }
        
        .navbar { background-color: #7c90b1; }
        .navbar-brand { color: white !important; }

        .enroll-container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative; /* For positioning internal elements if needed */
        }

        /* Back Button Style */
        .back-btn {
            display: inline-flex;
            align-items: center;
            color: #7c90b1;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .back-btn:hover {
            color: #5a6d8d;
            transform: translateX(-5px);
        }

        h2 { font-family: 'Playfair Display'; color: #7c90b1; text-align: center; margin-bottom: 30px; }

        .form-label { font-weight: 600; color: #555; }
        
        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #fcebeb;
            padding: 12px;
            background-color: #fffafa;
        }

        .form-control:focus {
            border-color: #7c90b1;
            box-shadow: 0 0 0 0.25rem rgba(124, 144, 177, 0.25);
        }

        .submit-btn {
            background-color: #7c90b1;
            color: white;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            border: none;
            transition: 0.3s;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background-color: #5a6d8d;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">Learning Beyond Barriers</a>
            <a class="navbar-brand" href="index.html">Learning Beyond Barriers</a>
        </div>
    </nav>

    <div class="container">
        <div class="enroll-container">
            <a href="services.html" class="back-btn">
                ← Back to Subjects
            </a>

            <h2>Enroll to a subject here</h2>
            
            <form action="#" method="POST">
                <div class="mb-3">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="fullName" placeholder="Enter your full name" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="example@email.com" required>
                </div>

                <div class="mb-3">
                    <label for="subjectSelect" class="form-label">Select Subject</label>
                    <select class="form-select" id="subjectSelect">
                        <option value="math">Modern Math</option>
                        <option value="language">Language</option>
                        <option value="science">Science</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="notes" class="form-label">Additional Notes</label>
                    <textarea class="form-control" id="notes" rows="3" placeholder="Tell us about your learning goals..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit Enrollment</button>
            </form>
        </div>
    </div>

</body>
</html>
